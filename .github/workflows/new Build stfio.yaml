name: new Build stfio (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          
      - name: Update biosig submodule to correct tag
        run: |
          cd src/biosig
          git fetch --all --tags
          git checkout v3.9.3
        shell: bash

      - name: Install build tools
        run: choco install swig -y

      # vcpkg 已预装在 GitHub Actions 的 windows-latest 镜像中
      # 设置 manifest mode 所需的环境变量
      - name: Configure vcpkg environment
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV


         
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      
      
      - name: Build wheel via pyproject.toml
        run: |
          python -m pip install .
          python -m pip wheel . --wheel-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: stfio-windows-wheel
          path: dist/*.whl


      - uses: actions/upload-artifact@v4
        with:
          name: stfio-wheel-windows
          path: dist/*.whl
