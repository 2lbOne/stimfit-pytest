name: new Build stfio (Windows)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Update biosig submodule to correct tag
        run: |
          cd src/biosig
          git fetch --all --tags
          git checkout v3.9.3
        shell: bash
        
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install CMake dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Install build tools and cibuildwheel
        run: |
          python -m pip install --upgrade cibuildwheel

      - name: Build wheel for Python 3.14
        env:
          CIBW_BUILD: cp314-win_amd64
          CIBW_PRERELEASE_PYTHONS: True
          CIBW_ENVIRONMENT: >
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows -DVCPKG_MANIFEST_MODE=ON -DBUILD_SHARED_LIBS=ON"
        run: python -m pip wheel . --wheel-dir dist


      - uses: actions/upload-artifact@v4
        with:
          name: stfio-wheel-windows
          path: dist/*.whl
