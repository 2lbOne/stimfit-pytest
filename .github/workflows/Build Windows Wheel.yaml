name: Build Windows Wheel (Python 3.14)

on:
  push:
    branches: [ main]
  workflow_dispatch:

jobs:
  build-windows-wheels:
    name: Build stimfit for Python 3.14 on Windows
    runs-on: windows-latest

    steps:
      - name: Enable Windows Long Paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 确保拉取可能存在的 C++ 子模块
          fetch-depth: 0

      - name: Update biosig submodule to correct tag
        run: |
          cd src/biosig
          git fetch --all --tags
          git checkout v3.9.3
        shell: bash

        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' 

          
      - name: Setup vcpkg Cache
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_WORKSPACE\vcpkg_cache"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$env:RUNNER_WORKSPACE\vcpkg_cache" >> $env:GITHUB_ENV
        shell: powershell
        
  

      - name: Install build tools and cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheel for Python 3.14
        env:
          CIBW_BUILD: cp314-win_amd64
          CIBW_PRERELEASE_PYTHONS: True
          # 核心修改：将 CMake 参数传递给底层构建系统，激活 vcpkg 清单模式
          CIBW_ENVIRONMENT: >
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows -DVCPKG_MANIFEST_MODE=ON"
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stimfit-windows-py314-wheel
          path: ./wheelhouse/*.whl
          retention-days: 14
